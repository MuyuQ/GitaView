name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            args: '--target x86_64-apple-darwin'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            args: ''

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.target }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          cache-targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate release version
        id: release_mode
        run: node scripts/validate-release-version.cjs

      - name: Validate release signing secrets
        if: steps.release_mode.outputs.unsigned != 'true'
        run: node scripts/validate-release-signing.cjs
        env:
          RELEASE_PLATFORM: ${{ matrix.platform }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Configure Windows signing certificate
        if: startsWith(matrix.platform, 'windows') && steps.release_mode.outputs.unsigned != 'true'
        run: ./scripts/configure-windows-signing.ps1
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}

      - name: Run frontend tests
        run: npm test

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Check target compilation
        run: cargo check --manifest-path src-tauri/Cargo.toml --target ${{ matrix.target }}

      - name: Run target Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --target ${{ matrix.target }} --all-targets -- -D warnings

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'GitaView ${{ github.ref_name }}'
          releaseBody: |
            ## GitaView ${{ github.ref_name }}

            ${{ steps.release_mode.outputs.unsigned == 'true' && '### Warning: Unsigned test build. Windows SmartScreen and macOS Gatekeeper may block installation. Do not present these artifacts as a stable release.' || '### Signed release candidate.' }}
            
            ### Downloads
            - **Windows**: `.exe` installer or `.msi` package
            - **macOS (Apple Silicon)**: `.dmg` for M1/M2/M3 Macs
            - **macOS (Intel)**: `.dmg` for Intel Macs
            
            See commit history for details.
          releaseDraft: true
          prerelease: ${{ steps.release_mode.outputs.unsigned == 'true' }}
          args: ${{ matrix.args }}

      - name: Verify Windows installer signatures
        if: startsWith(matrix.platform, 'windows') && steps.release_mode.outputs.unsigned != 'true'
        run: ./scripts/verify-windows-signatures.ps1
